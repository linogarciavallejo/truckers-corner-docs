<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truckers Corner — Explorador de Flujos de Trabajo</title>
<style>
  :root{
    --biz:#2563eb; --biz-bg:#dbeafe;
    --tech:#0d9488; --tech-bg:#ccfbf1;
    --ext:#d97706; --ext-bg:#fef3c7;
    --ink:#0f172a; --muted:#64748b; --line:#cbd5e1;
    --bg:#f1f5f9; --card:#ffffff; --accent:#4f46e5;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  .app{display:flex;height:100vh;overflow:hidden}

  /* Sidebar */
  .side{width:300px;flex-shrink:0;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;overflow-y:auto}
  .side .brand{padding:18px 18px 4px}
  .side .brand .logo{font-size:16px;font-weight:800;letter-spacing:.3px}
  .side .brand .logo span{color:#818cf8}
  .side .sub{font-size:11.5px;color:#94a3b8;padding:2px 18px 14px;line-height:1.5}
  .side .sec{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#64748b;padding:14px 18px 6px}
  .flowbtn{display:block;width:100%;text-align:left;border:0;background:transparent;color:#cbd5e1;padding:9px 18px;font-size:13px;cursor:pointer;border-left:3px solid transparent;line-height:1.35}
  .flowbtn:hover{background:#1e293b;color:#fff}
  .flowbtn.active{background:#1e293b;color:#fff;border-left-color:var(--accent);font-weight:600}
  .flowbtn .ic{margin-right:8px}
  .navbtn{font-weight:600;color:#e2e8f0}
  .legend{padding:6px 18px 14px;font-size:11.5px}
  .legend .row{display:flex;align-items:center;gap:8px;margin:5px 0;color:#cbd5e1}
  .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .filterbtns{display:flex;gap:6px;padding:4px 18px 14px}
  .filterbtns button{flex:1;font-size:11px;padding:6px 4px;border:1px solid #334155;background:#1e293b;color:#cbd5e1;border-radius:6px;cursor:pointer}
  .filterbtns button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .gloss{padding:0 18px 24px}
  .gloss summary{cursor:pointer;padding:8px 0;color:#94a3b8;font-size:10.5px;text-transform:uppercase;letter-spacing:1px}
  .gloss dt{font-weight:600;color:#fff;margin-top:9px;font-size:12px}
  .gloss dd{margin:2px 0 0;color:#94a3b8;line-height:1.45;font-size:11.5px}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .flowView{flex:1;display:flex;flex-direction:column;min-height:0}
  .flowView.hide{display:none}
  .flowhead{padding:16px 22px 12px;background:var(--card);border-bottom:1px solid var(--line)}
  .flowhead h2{margin:0 0 5px;font-size:18px}
  .flowhead p{margin:0;color:var(--muted);font-size:13px;line-height:1.5;max-width:1000px}
  .flowhead .goal{margin-top:8px;font-size:12.5px;color:#3730a3;background:#eef2ff;border:1px solid #c7d2fe;border-radius:7px;padding:7px 10px;max-width:1000px;line-height:1.5}
  .controls{display:flex;align-items:center;gap:8px;padding:10px 22px;background:var(--card);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .controls button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;color:var(--ink)}
  .controls button:hover{background:#f8fafc}
  .controls button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .controls .counter{font-size:13px;color:var(--muted);margin-left:4px}
  .controls .sp{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .controls select{padding:5px;border-radius:6px;border:1px solid var(--line)}
  .progress{height:3px;background:#e2e8f0}
  .progress .bar{height:100%;background:var(--accent);width:0;transition:width .35s ease}

  .stage{flex:1;display:flex;min-height:0}
  .diagram-wrap{flex:1;overflow:auto;padding:0 22px 40px;position:relative}
  .diagram{position:relative;margin:0 auto}
  .lifelines{position:absolute;top:0;left:0;pointer-events:none}
  .head{position:absolute;top:14px;transform:translateX(-50%);width:170px;text-align:center}
  .head .box{border-radius:9px;padding:8px 6px;font-size:12px;font-weight:600;line-height:1.2;border:1.5px solid}
  .head .role{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;margin-top:3px;opacity:.8}
  .head[data-type=business] .box{background:var(--biz-bg);border-color:var(--biz);color:#1e3a8a}
  .head[data-type=tech] .box{background:var(--tech-bg);border-color:var(--tech);color:#115e59}
  .head[data-type=external] .box{background:var(--ext-bg);border-color:var(--ext);color:#92400e}

  .row{position:absolute;left:0;opacity:0;transform:translateY(6px);transition:opacity .4s ease,transform .4s ease}
  .row.done{opacity:.55;transform:none}
  .row.active{opacity:1;transform:none}
  .row .num{position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;border:1.5px solid var(--line);font-size:11px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);z-index:3}
  .row.active .num{background:var(--accent);color:#fff;border-color:var(--accent)}
  .row .label{position:absolute;transform:translate(-50%,-50%);font-size:12px;font-weight:600;color:var(--ink);background:rgba(241,245,249,.92);padding:2px 7px;border-radius:5px;white-space:nowrap;max-width:340px;overflow:hidden;text-overflow:ellipsis;z-index:2}
  .row .data{position:absolute;transform:translate(-50%,-50%);font-size:10.5px;color:var(--accent);font-family:ui-monospace,Menlo,Consolas,monospace;background:#eef2ff;border:1px solid #c7d2fe;padding:1px 6px;border-radius:5px;white-space:nowrap;max-width:340px;overflow:hidden;text-overflow:ellipsis;z-index:2}
  .row svg .arrow{stroke:#94a3b8;stroke-width:1.6;fill:#94a3b8}
  .row.active svg .arrow{stroke:var(--accent);stroke-width:2.4;fill:var(--accent)}
  .row.done svg .arrow{stroke:#94a3b8;stroke-width:1.6}
  .row .concept-flag{position:absolute;font-size:14px;transform:translate(-50%,-50%);z-index:3}

  /* layer focus */
  .diagram.focus-business .head[data-type=tech],
  .diagram.focus-business .head[data-type=external],
  .diagram.focus-business .ll[data-type=tech],
  .diagram.focus-business .ll[data-type=external]{opacity:.18}
  .diagram.focus-tech .head[data-type=business],
  .diagram.focus-tech .ll[data-type=business]{opacity:.18}
  .row.dimmed{opacity:.12 !important}

  /* Panel */
  .panel{width:350px;flex-shrink:0;background:var(--card);border-left:1px solid var(--line);overflow-y:auto;padding:20px}
  .panel .step-tag{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .panel .flowline{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:13px;font-weight:600;flex-wrap:wrap}
  .panel .chip{padding:3px 9px;border-radius:6px;font-size:12px;border:1.5px solid}
  .panel .chip[data-type=business]{background:var(--biz-bg);border-color:var(--biz);color:#1e3a8a}
  .panel .chip[data-type=tech]{background:var(--tech-bg);border-color:var(--tech);color:#115e59}
  .panel .chip[data-type=external]{background:var(--ext-bg);border-color:var(--ext);color:#92400e}
  .panel .arrowic{color:var(--muted)}
  .panel h3{font-size:15px;margin:14px 0 6px}
  .panel .desc{font-size:13.5px;line-height:1.6;color:#334155}
  .panel .payload{margin-top:12px;font-size:11.5px;font-family:ui-monospace,Menlo,Consolas,monospace;background:#0f172a;color:#a5b4fc;padding:10px 12px;border-radius:8px;line-height:1.5;word-break:break-word}
  .panel .payload .k{color:#64748b;display:block;margin-bottom:4px;font-family:system-ui;text-transform:uppercase;letter-spacing:.5px}
  .concept{margin-top:16px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;border-radius:10px;padding:13px 14px}
  .concept .t{font-size:12.5px;font-weight:700;color:#92400e;display:flex;align-items:center;gap:6px}
  .concept .b{font-size:12.5px;line-height:1.55;color:#78350f;margin-top:6px}
  .panel .idle{color:var(--muted);font-size:13.5px;line-height:1.6}

  /* Business view */
  .bizview{flex:1;overflow-y:auto;display:none;background:var(--bg)}
  .bizview.show{display:block}
  .biz-inner{max-width:1080px;margin:0 auto;padding:30px 34px 60px}
  .hero{background:linear-gradient(135deg,#1e293b,#4f46e5);color:#fff;border-radius:16px;padding:30px 32px}
  .hero .logo{font-size:24px;font-weight:800;letter-spacing:.3px}
  .hero .logo span{color:#c7d2fe}
  .hero .tag{font-size:15px;color:#e0e7ff;margin-top:6px;font-weight:500}
  .hero .pitch{font-size:14px;line-height:1.7;color:#e2e8f0;margin-top:14px;max-width:880px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}
  .bcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 22px}
  .bcard h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:8px}
  .bcard ul{margin:0;padding-left:18px}
  .bcard li{font-size:13px;line-height:1.65;color:#334155;margin-bottom:7px}
  .bcard p{font-size:13.5px;line-height:1.7;color:#334155;margin:0}
  .valuegrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
  .vrow{border-left:3px solid var(--accent);padding:4px 0 4px 12px}
  .vrow .r{font-weight:700;font-size:13px;color:var(--ink)}
  .vrow .v{font-size:12.5px;color:#475569;line-height:1.55;margin-top:3px}
  .sectitle{font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:30px 0 14px;font-weight:700}
  .goalgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
  .gcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(15,23,42,.10);border-color:var(--accent)}
  .gcard .gh{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .gcard .gl{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);font-weight:700;margin-top:11px}
  .gcard .gt{font-size:12.8px;line-height:1.55;color:#334155;margin-top:3px}
  .gcard .pain{color:#9a3412}
  .kpis{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .kpis span{font-size:11px;background:#f1f5f9;border:1px solid var(--line);border-radius:20px;padding:3px 10px;color:#475569}
  .gcard .cta{font-size:11.5px;color:var(--accent);font-weight:600;margin-top:13px}
  @media (max-width:1100px){.panel{width:300px}.side{width:250px}.grid2,.valuegrid,.goalgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">Truckers<span> Corner</span></div></div>
    <div class="sub" id="m-sub"></div>
    <div class="sec">Vista</div>
    <button class="flowbtn navbtn" id="biz-btn">📌 Visión de negocio</button>
    <div class="sec">Flujos de trabajo</div>
    <nav id="flowlist"></nav>
    <div class="sec">Enfoque de capa</div>
    <div class="filterbtns" id="filters">
      <button data-f="all" class="on">Todo</button>
      <button data-f="business">Negocio</button>
      <button data-f="tech">Técnico</button>
    </div>
    <div class="sec">Leyenda</div>
    <div class="legend">
      <div class="row"><span class="dot" style="background:var(--biz)"></span>Actor de negocio</div>
      <div class="row"><span class="dot" style="background:var(--tech)"></span>Componente técnico</div>
      <div class="row"><span class="dot" style="background:var(--ext)"></span>Sistema externo</div>
    </div>
    <div class="gloss">
      <details><summary>Glosario del dominio</summary><dl id="glossary"></dl></details>
    </div>
  </aside>

  <main class="main">
    <!-- BUSINESS VIEW -->
    <section class="bizview" id="bizView"></section>

    <!-- FLOW VIEW -->
    <div class="flowView" id="flowView">
      <div class="flowhead"><h2 id="fh-name"></h2><p id="fh-sum"></p><div class="goal" id="fh-goal"></div></div>
      <div class="controls">
        <button id="btn-restart">⟲ Reiniciar</button>
        <button id="btn-prev">◀ Anterior</button>
        <button id="btn-play" class="primary">▶ Reproducir</button>
        <button id="btn-next">Siguiente ▶</button>
        <span class="counter" id="counter">Paso 0 / 0</span>
        <span class="sp">Velocidad
          <select id="speed">
            <option value="2600">Lenta</option>
            <option value="1800" selected>Normal</option>
            <option value="1100">Rápida</option>
          </select>
        </span>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="stage">
        <div class="diagram-wrap"><div class="diagram" id="diagram"></div></div>
        <aside class="panel" id="panel"></aside>
      </div>
    </div>
  </main>
</div>

(function(){
  "use strict";
  var DATA = JSON.parse(document.getElementById('wf-data').textContent);
  var actorsById = {}; DATA.actors.forEach(function(a){actorsById[a.id]=a;});

  var COL_W=200, HEAD_H=96, STEP_H=98, PAD_BOTTOM=30;
  var state={flow:null, step:0, playing:false, timer:null, filter:'all', view:'business'};

  document.getElementById('m-sub').textContent = DATA.meta.subtitle;
  var gl=document.getElementById('glossary');
  DATA.glossary.forEach(function(g){
    var dt=document.createElement('dt'); dt.textContent=g.term; gl.appendChild(dt);
    var dd=document.createElement('dd'); dd.textContent=g.def; gl.appendChild(dd);
  });

  // ---- Flow list ----
  var list=document.getElementById('flowlist');
  DATA.flows.forEach(function(f,i){
    var b=document.createElement('button');
    b.className='flowbtn'; b.dataset.idx=i;
    b.innerHTML='<span class="ic">'+(f.icon||'•')+'</span>'+esc(f.name);
    b.addEventListener('click',function(){selectFlow(i);});
    list.appendChild(b);
  });

  document.getElementById('biz-btn').addEventListener('click',showBusiness);

  // ---- Filters ----
  document.getElementById('filters').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    state.filter=b.dataset.f;
    [].forEach.call(this.querySelectorAll('button'),function(x){x.classList.toggle('on',x===b);});
    if(state.view==='flow') applyFilter();
  });

  // ---- Controls ----
  document.getElementById('btn-play').addEventListener('click',togglePlay);
  document.getElementById('btn-next').addEventListener('click',function(){pause();stepTo(state.step+1);});
  document.getElementById('btn-prev').addEventListener('click',function(){pause();stepTo(state.step-1);});
  document.getElementById('btn-restart').addEventListener('click',function(){pause();stepTo(0);});

  // ---- Business view ----
  function showBusiness(){
    pause();
    state.view='business';
    document.getElementById('bizView').classList.add('show');
    document.getElementById('flowView').classList.add('hide');
    document.getElementById('biz-btn').classList.add('active');
    [].forEach.call(list.children,function(b){b.classList.remove('active');});
    renderBusiness();
  }

  function renderBusiness(){
    var bz=DATA.business, el=document.getElementById('bizView');
    var h='<div class="biz-inner">';
    h+='<div class="hero"><div class="logo">Truckers<span> Corner</span></div>'
      +'<div class="tag">'+esc(bz.tagline)+'</div>'
      +'<div class="pitch">'+esc(bz.pitch)+'</div></div>';

    h+='<div class="grid2">';
    h+='<div class="bcard"><h3>⚠️ El problema hoy</h3><ul>';
    bz.problem.forEach(function(p){h+='<li>'+esc(p)+'</li>';});
    h+='</ul></div>';
    h+='<div class="bcard"><h3>💰 Modelo de negocio</h3><p>'+esc(bz.model)+'</p></div>';
    h+='</div>';

    h+='<div class="bcard" style="margin-top:18px"><h3>🎯 Valor por actor</h3><div class="valuegrid">';
    bz.valueByActor.forEach(function(v){
      h+='<div class="vrow"><div class="r">'+esc(v.role)+'</div><div class="v">'+esc(v.value)+'</div></div>';
    });
    h+='</div></div>';

    h+='<div class="sectitle">Meta de cada flujo de trabajo</div><div class="goalgrid">';
    DATA.flows.forEach(function(f,i){
      h+='<div class="gcard" data-idx="'+i+'">'
        +'<div class="gh">'+(f.icon||'•')+' '+esc(f.name)+'</div>'
        +'<div class="gl">Objetivo</div><div class="gt">'+esc(f.goal||'')+'</div>'
        +'<div class="gl">Valor que entrega</div><div class="gt">'+esc(f.value||'')+'</div>'
        +'<div class="gl">Dolor que elimina</div><div class="gt pain">'+esc(f.pain||'')+'</div>'
        +'<div class="gl">KPIs</div><div class="kpis">'+(f.kpis||[]).map(function(k){return '<span>'+esc(k)+'</span>';}).join('')+'</div>'
        +'<div class="cta">Ver el flujo paso a paso →</div>'
        +'</div>';
    });
    h+='</div></div>';
    el.innerHTML=h;
    [].forEach.call(el.querySelectorAll('.gcard'),function(c){
      c.addEventListener('click',function(){selectFlow(parseInt(c.dataset.idx,10));});
    });
  }

  function selectFlow(i){
    state.flow=DATA.flows[i]; state.step=0; pause();
    state.view='flow';
    document.getElementById('bizView').classList.remove('show');
    document.getElementById('flowView').classList.remove('hide');
    document.getElementById('biz-btn').classList.remove('active');
    [].forEach.call(list.children,function(b,j){b.classList.toggle('active',j===i);});
    document.getElementById('fh-name').textContent=state.flow.name;
    document.getElementById('fh-sum').textContent=state.flow.summary;
    document.getElementById('fh-goal').innerHTML='🎯 <b>Meta de negocio:</b> '+esc(state.flow.goal||'');
    buildDiagram();
    render();
  }

  function colIndex(flow,id){return flow.participants.indexOf(id);}
  function colX(idx){return idx*COL_W + COL_W/2;}

  function buildDiagram(){
    var f=state.flow, dg=document.getElementById('diagram');
    var W=f.participants.length*COL_W;
    var H=HEAD_H + f.steps.length*STEP_H + PAD_BOTTOM;
    dg.style.width=W+'px'; dg.style.height=H+'px';
    dg.className='diagram';
    var html='';
    html+='<svg class="lifelines" width="'+W+'" height="'+H+'">';
    f.participants.forEach(function(id,i){
      var a=actorsById[id], x=colX(i), color=a.type==='business'?'#93c5fd':a.type==='tech'?'#5eead4':'#fcd34d';
      html+='<line class="ll" data-type="'+a.type+'" x1="'+x+'" y1="'+(HEAD_H-8)+'" x2="'+x+'" y2="'+(H-10)+'" stroke="'+color+'" stroke-width="1.5" stroke-dasharray="4 5"/>';
    });
    html+='</svg>';
    f.participants.forEach(function(id,i){
      var a=actorsById[id], x=colX(i);
      var role=a.type==='business'?'Negocio':a.type==='tech'?'Técnico':'Externo';
      html+='<div class="head" data-type="'+a.type+'" style="left:'+x+'px" title="'+esc(a.short)+'">'
          +'<div class="box">'+esc(a.name)+'</div><div class="role">'+role+'</div></div>';
    });
    f.steps.forEach(function(s,i){
      var top=HEAD_H + i*STEP_H;
      var si=colIndex(f,s.from), ti=colIndex(f,s.to);
      var x1=colX(si), x2=colX(ti);
      var yc=STEP_H*0.60;
      var fromType=actorsById[s.from].type, toType=actorsById[s.to].type;
      html+='<div class="row" data-i="'+i+'" data-ft="'+fromType+'" data-tt="'+toType+'" style="top:'+top+'px;width:'+(f.participants.length*COL_W)+'px;height:'+STEP_H+'px">';
      html+='<svg width="'+(f.participants.length*COL_W)+'" height="'+STEP_H+'">'+arrowSVG(x1,x2,yc,s.self)+'</svg>';
      html+='<div class="num" style="left:'+x1+'px;top:'+yc+'px">'+(i+1)+'</div>';
      var midX = s.self ? (x1+62) : (x1+x2)/2;
      html+='<div class="label" style="left:'+midX+'px;top:'+(yc-20)+'px">'+esc(s.action)+'</div>';
      html+='<div class="data" style="left:'+midX+'px;top:'+(yc+18)+'px" title="'+esc(s.data)+'">'+esc(s.data)+'</div>';
      if(s.concept){ html+='<div class="concept-flag" style="left:'+(midX + (s.self?90:0))+'px;top:'+(yc-20)+'px" title="Concepto clave">💡</div>'; }
      html+='</div>';
    });
    dg.innerHTML=html;
    applyFilter();
  }

  function arrowSVG(x1,x2,y,self){
    if(self){
      var ex=x1+6, ey=y+16;
      var path='M '+x1+' '+(y-8)+' h 52 v 24 h -46';
      var head='M '+ex+' '+ey+' l 9 -5 l 0 10 z';
      return '<path class="arrow" d="'+path+'" fill="none"/><path class="arrow" d="'+head+'"/>';
    }
    var dir = x2>x1?1:-1;
    var hx=x2 - dir*9;
    var head='M '+x2+' '+y+' L '+hx+' '+(y-5)+' L '+hx+' '+(y+5)+' z';
    return '<line class="arrow" x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'"/><path class="arrow" d="'+head+'"/>';
  }

  function applyFilter(){
    var dg=document.getElementById('diagram');
    dg.classList.toggle('focus-business',state.filter==='business');
    dg.classList.toggle('focus-tech',state.filter==='tech');
    [].forEach.call(dg.querySelectorAll('.row'),function(r){
      var ft=r.dataset.ft, tt=r.dataset.tt, dim=false;
      if(state.filter==='business') dim = (ft!=='business' && tt!=='business');
      if(state.filter==='tech') dim = (ft==='business' && tt==='business');
      r.classList.toggle('dimmed',dim);
    });
  }

  function render(){
    var f=state.flow; if(!f)return;
    var rows=document.querySelectorAll('#diagram .row');
    [].forEach.call(rows,function(r,i){
      r.classList.remove('done','active');
      if(i < state.step-1) r.classList.add('done');
      else if(i === state.step-1) r.classList.add('active');
      else r.style.opacity='0';
      if(i <= state.step-1) r.style.opacity='';
    });
    document.getElementById('counter').textContent='Paso '+state.step+' / '+f.steps.length;
    document.getElementById('bar').style.width=(f.steps.length? (state.step/f.steps.length*100):0)+'%';
    var act=document.querySelector('#diagram .row.active');
    if(act) act.scrollIntoView({behavior:'smooth',block:'center'});
    renderPanel();
  }

  function renderPanel(){
    var f=state.flow, p=document.getElementById('panel');
    if(state.step===0){
      p.innerHTML='<div class="step-tag">'+esc(f.name)+'</div><h3>Resumen del flujo</h3>'
        +'<div class="desc">'+esc(f.summary)+'</div>'
        +'<div class="idle" style="margin-top:18px">Presiona <b>▶ Reproducir</b> o <b>Siguiente</b> para recorrer el flujo paso a paso. Cada paso muestra qué dato viaja entre actores y componentes. Los pasos con 💡 incluyen un concepto clave del dominio.</div>';
      return;
    }
    var s=f.steps[state.step-1];
    var fa=actorsById[s.from], ta=actorsById[s.to];
    var html='<div class="step-tag">Paso '+state.step+' de '+f.steps.length+'</div>';
    html+='<div class="flowline"><span class="chip" data-type="'+fa.type+'">'+esc(fa.name)+'</span>'
        + (s.self?'<span class="arrowic">↺</span>':'<span class="arrowic">→</span>')
        + '<span class="chip" data-type="'+ta.type+'">'+esc(ta.name)+'</span></div>';
    html+='<h3>'+esc(s.action)+'</h3>';
    html+='<div class="desc">'+esc(s.desc||'')+'</div>';
    if(s.data) html+='<div class="payload"><span class="k">Datos que viajan</span>'+esc(s.data)+'</div>';
    if(s.concept) html+='<div class="concept"><div class="t">💡 '+esc(s.concept.title)+'</div><div class="b">'+esc(s.concept.body)+'</div></div>';
    p.innerHTML=html;
  }

  function stepTo(n){
    var max=state.flow.steps.length;
    state.step=Math.max(0,Math.min(n,max));
    render();
    if(state.playing && state.step>=max) pause();
  }
  function togglePlay(){ state.playing?pause():play(); }
  function play(){
    if(!state.flow)return;
    if(state.step>=state.flow.steps.length) state.step=0;
    state.playing=true; document.getElementById('btn-play').textContent='⏸ Pausa';
    tick();
  }
  function tick(){
    clearTimeout(state.timer);
    var sp=parseInt(document.getElementById('speed').value,10);
    state.timer=setTimeout(function(){
      if(!state.playing)return;
      if(state.step<state.flow.steps.length){ stepTo(state.step+1); tick(); }
      else pause();
    }, state.step===0?300:sp);
  }
  function pause(){ state.playing=false; clearTimeout(state.timer); document.getElementById('btn-play').textContent='▶ Reproducir'; }

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  // init: arranca en la Visión de negocio
  showBusiness();
})();
</script>
</body>
</html>
